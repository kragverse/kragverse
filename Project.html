<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pahadi Hot Line</title>
    <script src="https://unpkg.com/@daily-co/daily-js"></script>
    
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-red: #ff3366;
            --bg-color: #060913;
            --panel-bg: #0b111e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .terminal {
            width: 100%;
            max-width: 950px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
            text-align: center;
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 15px 0;
            text-shadow: 0 0 10px var(--neon-cyan);
            letter-spacing: 3px;
        }

        /* Video Screen Panel Box */
        .video-screen-wrapper {
            width: 100%;
            height: 70vh; /* Scaled dynamically to look good on phones and desktop */
            min-height: 400px;
            background: #020408;
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }

        /* Clean Standby Screen */
        .standby-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #03060c;
            z-index: 5;
        }

        .pulse-indicator {
            width: 18px;
            height: 18px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            margin-bottom: 15px;
            animation: pulseGlow 1.5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0px var(--neon-cyan); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 15px var(--neon-cyan); }
            100% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0px var(--neon-cyan); }
        }

        .status-msg {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: rgba(0, 255, 204, 0.7);
        }

        /* Daily Video Grid Layout Settings */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
        }

        /* Navigation Action Console */
        .control-deck {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            background: transparent;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            font-weight: bold;
            padding: 12px 30px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .btn-join {
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
        }

        .btn-join:hover:not(:disabled) {
            background: var(--neon-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .btn-drop {
            color: var(--neon-red);
            border: 2px solid var(--neon-red);
        }

        .btn-drop:hover:not(:disabled) {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 15px var(--neon-red);
        }

        button:disabled {
            border-color: #202b3d;
            color: #202b3d;
            cursor: not-allowed;
            background: transparent !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>⚡ PAHADI HOT LINE ⚡</h1>

        <div class="video-screen-wrapper">
            <div id="standby" class="standby-overlay">
                <div class="pulse-indicator"></div>
                <div id="status-label" class="status-msg">READY FOR SECURE HOOKUP</div>
            </div>
            <div id="video-frame-root" style="width:100%; height:100%;"></div>
        </div>

        <div class="control-deck">
            <button id="join-btn" class="btn-join" onclick="patchIn()">START CALL</button>
            <button id="drop-btn" class="btn-drop" onclick="cutLine()" disabled>HANG UP</button>
        </div>
    </div>

    <script>
        let callFrame = null;
        const MY_ROOM_URL = "https://hottline.daily.co/Hottline"; 

        function patchIn() {
            document.getElementById('status-label').innerText = "CONNECTING BOTH CODES...";

            // This sets up Daily's custom dashboard interface directly matching split layouts
            callFrame = window.DailyIframe.createInFrame(document.getElementById('video-frame-root'), {
                showLeaveButton: true, // Shows camera, mic, layout toggle, and hangup keys built-in
                showFullscreenButton: true,
                style: {
                    container: {
                        width: '100%',
                        height: '100%',
                        background: '#020408'
                    }
                }
            });

            // Cleanly remove our waiting screen background as soon as camera feed hits
            callFrame.on('joined-meeting', () => {
                document.getElementById('standby').style.display = 'none';
            });

            // Reset dashboard look if a user manually exits inside the frame controls
            callFrame.on('left-meeting', () => {
                cleanUpUI();
            });

            // Fire and execute connection hook
            callFrame.join({ url: MY_ROOM_URL });

            document.getElementById('join-btn').disabled = true;
            document.getElementById('drop-btn').disabled = false;
        }

        function cutLine() {
            if (callFrame) {
                callFrame.leave();
                callFrame.destroy();
                callFrame = null;
                cleanUpUI();
            }
        }

        function cleanUpUI() {
            document.getElementById('standby').style.display = 'flex';
            document.getElementById('status-label').innerText = "READY FOR SECURE HOOKUP";
            document.getElementById('join-btn').disabled = false;
            document.getElementById('drop-btn').disabled = true;
        }
    </script>
</body>
</html>
